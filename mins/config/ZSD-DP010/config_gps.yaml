%YAML:1.0 # need to specify the file type at the top!

gps:
  enabled: true
  max_n: 1
  do_calib_ext: false
  do_calib_dt: false
  init_distance: 20.0
  init_closed_form: true
  init_cov_dt: 1e-3
  init_cov_ex: 1e-1
  init_cov_inflation: 2.0
  chi2_mult: 9999
  overwrite_noise: true
  noise: 3.0

gps0:
  timeoffset: 0.0
  # DP010 IMU→GNSS lever arm: [0.453, 0.677, 1.790] (meters)
  pGinI: [0.453, 0.677, 1.790]
  topic: "/zeron/localization/daoyuan/gnss_info"
  # Flag to enable DaoYuan custom GNSS message parsing
  use_daoyuan_msg: true